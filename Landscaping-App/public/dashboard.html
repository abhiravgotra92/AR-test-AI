<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Tracking — GreenEdge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🌿 Green<span>Edge</span></a>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="dashboard.html" class="active">Truck Tracking</a>
    <a href="admin.html">Admin</a>
    <a href="about.html">About & Contact</a>
  </div>
  <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="section">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
    <div>
      <h1 class="section-title" style="margin-bottom:0.25rem;">🚛 Truck Tracking</h1>
      <p class="section-sub" style="margin-bottom:0;">Real-time yard status via NFC</p>
    </div>
    <div id="wsStatus" class="nfc-pulse">Connecting…</div>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-number" id="countInYard">—</div>
      <div class="stat-label">Trucks in Yard</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="countTotal">—</div>
      <div class="stat-label">Total Trucks</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="countToday">—</div>
      <div class="stat-label">Events Today</div>
    </div>
  </div>

  <!-- Trucks currently in yard -->
  <div class="card" style="margin-bottom:2rem;">
    <h2 style="font-size:1.1rem;color:var(--green-dark);margin-bottom:1rem;">🟢 Currently in Yard</h2>
    <div id="yardList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;">
      <p style="color:var(--muted);font-size:.9rem;">Loading…</p>
    </div>
  </div>

  <!-- Log table -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1rem;">
      <h2 style="font-size:1.1rem;color:var(--green-dark);">📋 Entry / Exit Log</h2>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        <select id="filterAction" style="width:auto;padding:.4rem .7rem;font-size:.85rem;">
          <option value="">All Events</option>
          <option value="entry">Entries Only</option>
          <option value="exit">Exits Only</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadLogs()">Refresh</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Truck</th><th>Driver</th><th>Action</th><th>Timestamp</th><th>Note</th></tr>
        </thead>
        <tbody id="logBody">
          <tr><td colspan="5" style="text-align:center;color:var(--muted);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<footer>
  <p>© 2025 GreenEdge Landscaping · <a href="index.html">Home</a></p>
</footer>

<script>
const API = '';
let ws, allLogs = [];

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmt(ts) {
  return new Date(ts).toLocaleString();
}

async function loadStatus() {
  const r = await fetch(`${API}/api/status`);
  const d = await r.json();
  document.getElementById('countInYard').textContent = d.count;
  renderYard(d.yard);
}

async function loadTotalTrucks() {
  const r = await fetch(`${API}/api/trucks`);
  const d = await r.json();
  document.getElementById('countTotal').textContent = d.length;
}

async function loadLogs() {
  const r = await fetch(`${API}/api/logs`);
  allLogs = await r.json();
  const filter = document.getElementById('filterAction').value;
  const filtered = filter ? allLogs.filter(l => l.action === filter) : allLogs;

  const today = new Date().toDateString();
  document.getElementById('countToday').textContent =
    allLogs.filter(l => new Date(l.timestamp).toDateString() === today).length;

  const tbody = document.getElementById('logBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);">No logs yet.</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(l => `
    <tr>
      <td><strong>${l.truck_name}</strong></td>
      <td>${l.driver || '—'}</td>
      <td><span class="badge badge-${l.action}">${l.action === 'entry' ? '▶ Entry' : '◀ Exit'}</span></td>
      <td>${fmt(l.timestamp)}</td>
      <td style="color:var(--muted);font-size:.85rem;">${l.note || ''}</td>
    </tr>
  `).join('');
}

function renderYard(yard) {
  const el = document.getElementById('yardList');
  if (!yard.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:.9rem;">No trucks currently in yard.</p>';
    return;
  }
  el.innerHTML = yard.map(t => `
    <div style="background:#f0f8f0;border:1px solid var(--border);border-radius:10px;padding:1rem;">
      <div style="font-weight:700;color:var(--green-dark);">🚛 ${t.name}</div>
      <div style="font-size:.85rem;color:var(--muted);">${t.driver || 'No driver assigned'}</div>
      <div style="font-size:.78rem;color:var(--muted);margin-top:.25rem;">Since ${fmt(t.since)}</div>
    </div>
  `).join('');
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => {
    document.getElementById('wsStatus').textContent = 'Live';
  };
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'update') {
      document.getElementById('countInYard').textContent = d.count;
      renderYard(d.yard);
      loadLogs();
      if (d.truck) toast(`🚛 ${d.truck.name} — ${d.action}`);
    }
  };
  ws.onclose = () => {
    document.getElementById('wsStatus').textContent = 'Reconnecting…';
    setTimeout(connectWS, 3000);
  };
}

document.getElementById('filterAction').addEventListener('change', loadLogs);

loadStatus();
loadTotalTrucks();
loadLogs();
connectWS();
</script>
</body>
</html>
